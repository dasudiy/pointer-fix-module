name: Build Zygisk Module

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build native libraries with NDK
      run: |
        export NDK_PROJECT_PATH=.
        $ANDROID_NDK_HOME/ndk-build -C module

    - name: Package Magisk Module
      run: |
        mkdir -p module_out/zygisk
        mkdir -p module_out/META-INF/com/google/android

        cp module.prop module_out/

        # Zygisk requires the .so be named after the ABI, e.g. arm64-v8a.so
        for abi in arm64-v8a armeabi-v7a x86 x86_64; do
          lib="module/libs/$abi/libzygisk-pointer-fix.so"
          if [ -f "$lib" ]; then
            cp "$lib" "module_out/zygisk/${abi}.so"
          fi
        done

        # Magisk installer scripts
        printf '#MAGISK\n' > module_out/META-INF/com/google/android/updater-script
        printf '#!/sbin/sh\nSKIPUNZIP=1\nunzip -o "$ZIPFILE" '"'"'zygisk/*'"'"' -d "$MODPATH" >&2\nunzip -o "$ZIPFILE" '"'"'module.prop'"'"' -d "$MODPATH" >&2\nset_perm_recursive "$MODPATH" root root 0755 0644\n' > module_out/META-INF/com/google/android/update-binary

    - name: Zip Magisk module
      run: |
        cd module_out
        zip -r ../zygisk-pointer-fix.zip .

    - name: Upload Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-pointer-fix-module
        path: zygisk-pointer-fix.zip

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: zygisk-pointer-fix.zip
        generate_release_notes: true
